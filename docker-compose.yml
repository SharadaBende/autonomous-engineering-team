version: '3'

services:
  # Database service
  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=todoapp
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"

  # Cache service
  cache:
    image: redis:alpine
    ports:
      - "6379:6379"

  # Backend service
  backend:
    build: ./backend
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=todoapp
      - CACHE_HOST=cache
      - CACHE_PORT=6379
    depends_on:
      - db
      - cache
    ports:
      - "3000:3000"
    restart: always

  # Frontend service
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  db-data:

# Define a network for the services
networks:
  default:
    driver: bridge

# Define a config for the services
configs:
  db-config:
    file: ./db-config.env
  cache-config:
    file: ./cache-config.env

# Define a healthcheck for the services
healthcheck:
  test: ["curl", "--fail", "http://localhost:3000/healthcheck"]
  interval: 10s
  timeout: 5s
  retries: 3

# Define a logging configuration for the services
logging:
  driver: json-file
  options:
    labels: com.example
    env: os,customer
    compress: true

# Define an error handling configuration for the services
stop_grace_period: 10s
stop_signal: SIGTERM
container_name: todoapp
hostname: todoapp
domainname: todoapp
ulimits:
  nproc: 65535
  nofile: 65535
  memlock: -1